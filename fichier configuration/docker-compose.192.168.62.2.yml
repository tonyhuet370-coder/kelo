services:
  simulateur:
    build:
      context: ../simulateur
      dockerfile: Dockerfile
    ports:
      - "${SIMULATEUR_PORT:-5050}:5000"
    networks:
      - kelo-network
    depends_on:
      - mosquitto
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SIMULATEUR_PORT=5000
      - SIMULATEUR_HOST=0.0.0.0
      - MQTT_BROKER=${MQTT_BROKER:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TOPIC_TEMPLATE=${MQTT_TOPIC_TEMPLATE:-kelo/nid/{nid}/telemetry}
      - SIMULATED_NID=${SIMULATED_NID:-A12}
      - PUBLISH_INTERVAL=${PUBLISH_INTERVAL:-5}
      - TELEGRAM_ALERTS_ENABLED=${TELEGRAM_ALERTS_ENABLED:-true}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS:-}
      - ALERT_COOLDOWN_SECONDS=${ALERT_COOLDOWN_SECONDS:-60}
      - TEMPERATURE_ALERT_THRESHOLD=${TEMPERATURE_ALERT_THRESHOLD:-32}
      - HUMIDITE_ALERT_THRESHOLD=${HUMIDITE_ALERT_THRESHOLD:-95}
      - VIBRATION_ALERT_THRESHOLD=${VIBRATION_ALERT_THRESHOLD:-5}
      - TENSION_ALERT_THRESHOLD=${TENSION_ALERT_THRESHOLD:-1}

networks:
  kelo-network:
    name: kelo-622_kelo-network