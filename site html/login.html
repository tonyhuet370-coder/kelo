<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Kélonia</title>
  <link rel="stylesheet" href="style.css?v=20260224-login-1">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-name">Kélonia</span>
        
      </div>
      <nav>
        <ul class="nav-list">
          <li><a class="nav-link" href="index.html">Accueil</a></li>
          <li><a class="nav-link active" href="login.html">Connexion</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="login-page">
    <section class="login-card">
      <h1>Connexion</h1>
      <p class="subtitle">Accédez au tableau de bord des nids</p>

      <form id="loginForm" class="login-form">
        <label for="username">Identifiant</label>
        <input id="username" name="username" type="text" placeholder="admin" required>

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="admin" required>

        <button type="submit">Se connecter</button>
        <p id="loginError" class="login-error" aria-live="polite"></p>
      </form>

      
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2025 Kélonia · Surveillance des nids de tortues</p>
    </div>
  </footer>
  <form id="loginForm">
  <input type="text" name="username" placeholder="Nom d'utilisateur" required>
  <input type="password" name="password" placeholder="Mot de passe" required>
  <button type="submit">Connexion</button>
</form>


  <script>
 // ===============================
//   CONSTANTES
// ===============================
const AUTH_KEY = 'keloniaAuth';
const USER_KEY = 'keloniaUser';
const ROLE_KEY = 'keloniaRole';

// ===============================
//   HASH SHA-256 (sécurisé)
// ===============================
async function hashPassword(password) {
  const msgUint8 = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// ===============================
//   STOCKAGE (local / session / cookie)
// ===============================
function storageGet(key) {
  try { return localStorage.getItem(key); } catch (err) {}
  try { return sessionStorage.getItem(key); } catch (err) {}
  const cookieMatch = document.cookie.match(new RegExp(`(?:^|; )${key}=([^;]*)`));
  return cookieMatch ? decodeURIComponent(cookieMatch[1]) : null;
}

function storageSet(key, value) {
  try { localStorage.setItem(key, value); return; } catch (err) {}
  try { sessionStorage.setItem(key, value); return; } catch (err) {}
  document.cookie = `${key}=${encodeURIComponent(value)}; path=/; SameSite=Lax`;
}

// ===============================
//   CHARGEMENT DES UTILISATEURS
// ===============================
let USERS = {};

fetch("users.json")
  .then(res => res.json())
  .then(data => USERS = data)
  .catch(() => console.error("Impossible de charger users.json"));

// ===============================
//   REDIRECTION SI DÉJÀ CONNECTÉ
// ===============================
const DASHBOARD_URL = `${window.location.origin}/dashboard.html`;

if (storageGet(AUTH_KEY) === '1') {
  window.location.href = DASHBOARD_URL;
}

// ===============================
//   GESTION DU FORMULAIRE
// ===============================
const form = document.getElementById('loginForm');
const errorEl = document.getElementById('loginError');

form.addEventListener('submit', async (event) => {
  event.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const user = USERS[username];

  if (!user) {
    errorEl.textContent = "Identifiants incorrects.";
    return;
  }

  // Hash du mot de passe entré
  const hashed = await hashPassword(password);

  // Vérification
  if (hashed === user.password) {
    storageSet(AUTH_KEY, '1');
    storageSet(USER_KEY, username);
    storageSet(ROLE_KEY, user.role);

    window.location.href = DASHBOARD_URL;
    return;
  }

  errorEl.textContent = "Identifiants incorrects.";
});

  </script>
</body>
</html>
