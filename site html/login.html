<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Kélonia</title>
  <link rel="stylesheet" href="style.css?v=20260224-login-1">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-name">Kélonia</span>
        
      </div>
      <nav>
        <ul class="nav-list">
          <li><a class="nav-link" href="index.html">Accueil</a></li>
          <li><a class="nav-link active" href="login.html">Connexion</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="login-page">
    <section class="login-card">
      <h1>Connexion</h1>
      <p class="subtitle">Accédez au tableau de bord des nids</p>

      <form id="loginForm" class="login-form">
        <label for="username">Identifiant</label>
        <input id="username" name="username" type="text" placeholder="admin" required>

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="admin" required>

        <button type="submit">Se connecter</button>
        <p id="loginError" class="login-error" aria-live="polite"></p>
      </form>

      
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2025 Kélonia · Surveillance des nids de tortues</p>
    </div>
  </footer>

  <script>
    const AUTH_KEY = 'keloniaAuth';
    const USER_KEY = 'keloniaUser';
    const ROLE_KEY = 'keloniaRole';

    function storageGet(key) {
      try {
        return localStorage.getItem(key);
      } catch (err) {
        // localStorage may be blocked by browser privacy settings.
      }

      try {
        return sessionStorage.getItem(key);
      } catch (err) {
        // sessionStorage may also be blocked in strict modes.
      }

      const cookieMatch = document.cookie.match(new RegExp(`(?:^|; )${key}=([^;]*)`));
      return cookieMatch ? decodeURIComponent(cookieMatch[1]) : null;
    }

    function storageSet(key, value) {
      try {
        localStorage.setItem(key, value);
        return;
      } catch (err) {
        // Ignore and fallback.
      }

      try {
        sessionStorage.setItem(key, value);
        return;
      } catch (err) {
        // Ignore and fallback.
      }

      document.cookie = `${key}=${encodeURIComponent(value)}; path=/; SameSite=Lax`;
    }

    const USERS = {
      admin: { password: 'admin', role: 'admin' },
      viewer: { password: 'viewer', role: 'viewer' },
      gardien: { password: 'tortue', role: 'operator' }
    };

    const DASHBOARD_URL = `${window.location.origin}/dashboard.html`;

    if (storageGet(AUTH_KEY) === '1') {
      window.location.href = DASHBOARD_URL;
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const user = USERS[username];
      if (user && password === user.password) {
        storageSet(AUTH_KEY, '1');
        storageSet(USER_KEY, username);
        storageSet(ROLE_KEY, user.role);
        window.location.href = DASHBOARD_URL;
        return;
      }

      errorEl.textContent = 'Identifiants incorrects.';
    });
  </script>
</body>
</html>
