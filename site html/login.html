<body>

  <main class="login-page">
    <section class="login-card">
      <h1>Connexion</h1>
      <p class="subtitle">Accédez au tableau de bord des nids</p>

      <form id="loginForm" class="login-form">
        <label for="username">Identifiant</label>
        <input id="username" name="username" type="text" placeholder="admin" required>

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="admin" required>

        <button type="submit">Se connecter</button>
        <p id="loginError" class="login-error" aria-live="polite"></p>
      </form>

      
    </section>

    </div>

  <script>
 // ===============================
//   CONSTANTES
// ===============================
const AUTH_KEY = 'keloniaAuth';
const USER_KEY = 'keloniaUser';
const ROLE_KEY = 'keloniaRole';

// ===============================
//   HASH SHA-256 (sécurisé)
// ===============================
function sha256Fallback(password) {
  const bytes = Array.from(new TextEncoder().encode(password));
  const words = [];
  const hash = [
    0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
    0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
  ];
  const constants = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
  ];

  function rightRotate(value, amount) {
    return (value >>> amount) | (value << (32 - amount));
  }

  for (let i = 0; i < bytes.length; i += 1) {
    words[i >> 2] = (words[i >> 2] || 0) | (bytes[i] << (24 - (i % 4) * 8));
  }

  words[bytes.length >> 2] = (words[bytes.length >> 2] || 0) | (0x80 << (24 - (bytes.length % 4) * 8));

  const totalBits = bytes.length * 8;
  const totalWords = ((((bytes.length + 9) + 63) >> 6) * 16);
  words[totalWords - 2] = Math.floor(totalBits / 0x100000000);
  words[totalWords - 1] = totalBits >>> 0;

  for (let blockStart = 0; blockStart < totalWords; blockStart += 16) {
    const schedule = new Array(64);

    for (let index = 0; index < 16; index += 1) {
      schedule[index] = words[blockStart + index] || 0;
    }

    for (let index = 16; index < 64; index += 1) {
      const s0 = rightRotate(schedule[index - 15], 7) ^ rightRotate(schedule[index - 15], 18) ^ (schedule[index - 15] >>> 3);
      const s1 = rightRotate(schedule[index - 2], 17) ^ rightRotate(schedule[index - 2], 19) ^ (schedule[index - 2] >>> 10);
      schedule[index] = (((schedule[index - 16] + s0) | 0) + ((schedule[index - 7] + s1) | 0)) | 0;
    }

    let [a, b, c, d, e, f, g, h] = hash;

    for (let index = 0; index < 64; index += 1) {
      const s1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
      const choice = (e & f) ^ (~e & g);
      const temp1 = (((((h + s1) | 0) + choice) | 0) + ((constants[index] + schedule[index]) | 0)) | 0;
      const s0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
      const majority = (a & b) ^ (a & c) ^ (b & c);
      const temp2 = (s0 + majority) | 0;

      h = g;
      g = f;
      f = e;
      e = (d + temp1) | 0;
      d = c;
      c = b;
      b = a;
      a = (temp1 + temp2) | 0;
    }

    hash[0] = (hash[0] + a) | 0;
    hash[1] = (hash[1] + b) | 0;
    hash[2] = (hash[2] + c) | 0;
    hash[3] = (hash[3] + d) | 0;
    hash[4] = (hash[4] + e) | 0;
    hash[5] = (hash[5] + f) | 0;
    hash[6] = (hash[6] + g) | 0;
    hash[7] = (hash[7] + h) | 0;
  }

  return hash.map((value) => (value >>> 0).toString(16).padStart(8, "0")).join("");
}

async function hashPassword(password) {
  if (!window.crypto || !window.crypto.subtle || typeof window.crypto.subtle.digest !== 'function') {
    return sha256Fallback(password);
  }

  const msgUint8 = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// ===============================
//   STOCKAGE (local / session / cookie)
// ===============================
function storageGet(key) {
  try { return localStorage.getItem(key); } catch (err) {}
  try { return sessionStorage.getItem(key); } catch (err) {}
  const cookieMatch = document.cookie.match(new RegExp(`(?:^|; )${key}=([^;]*)`));
  return cookieMatch ? decodeURIComponent(cookieMatch[1]) : null;
}

function storageSet(key, value) {
  try { localStorage.setItem(key, value); return; } catch (err) {}
  try { sessionStorage.setItem(key, value); return; } catch (err) {}
  document.cookie = `${key}=${encodeURIComponent(value)}; path=/; SameSite=Lax`;
}

// ===============================
//   CHARGEMENT DES UTILISATEURS
// ===============================
let USERS = {};
let usersLoaded = false;

fetch("users.json")
  .then((res) => {
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }
    return res.json();
  })
  .then((data) => {
    USERS = data;
    usersLoaded = true;
  })
  .catch((err) => {
    console.error("Impossible de charger users.json", err);
    usersLoaded = false;
    if (errorEl) {
      errorEl.textContent = "Impossible de charger les utilisateurs.";
    }
  });

// ===============================
//   REDIRECTION SI DÉJÀ CONNECTÉ
// ===============================
const DASHBOARD_URL = `${window.location.origin}/dashboard.html`;

if (storageGet(AUTH_KEY) === '1') {
  window.location.href = DASHBOARD_URL;
}

// ===============================
//   GESTION DU FORMULAIRE
// ===============================
const form = document.getElementById('loginForm');
const errorEl = document.getElementById('loginError');

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  errorEl.textContent = "";

  try {
    if (!usersLoaded) {
      errorEl.textContent = "Chargement des utilisateurs en cours. Reessayez dans un instant.";
      return;
    }

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    const user = USERS[username];

    if (!user) {
      errorEl.textContent = "Identifiants incorrects.";
      return;
    }

    // Hash du mot de passe entré
    const hashed = await hashPassword(password);

    // Vérification
    if (hashed === user.password) {
      storageSet(AUTH_KEY, '1');
      storageSet(USER_KEY, username);
      storageSet(ROLE_KEY, user.role);

      if (storageGet(AUTH_KEY) !== '1' || storageGet(USER_KEY) !== username || storageGet(ROLE_KEY) !== user.role) {
        errorEl.textContent = "Connexion refusee: le navigateur bloque le stockage local.";
        return;
      }

      window.location.replace(DASHBOARD_URL);
      return;
    }

    errorEl.textContent = "Identifiants incorrects.";
  } catch (err) {
    console.error('Erreur de connexion', err);
    errorEl.textContent = "Impossible de verifier le mot de passe sur ce navigateur.";
  }
});

  </script>
