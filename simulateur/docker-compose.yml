version: '3.11'

services:
  # Simulateur API uniquement
  simulateur:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SIMULATEUR_PORT:-5000}:5000"
    networks:
      - kelo-network
    restart: unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SIMULATEUR_PORT=5000
      - SIMULATEUR_HOST=0.0.0.0
      - MQTT_BROKER=${MQTT_BROKER:-host.docker.internal}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TOPIC_TEMPLATE=${MQTT_TOPIC_TEMPLATE:-kelo/nid/{nid}/telemetry}
      - SIMULATED_NID=${SIMULATED_NID:-A12}
      - PUBLISH_INTERVAL=${PUBLISH_INTERVAL:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  kelo-network:
    driver: bridge
