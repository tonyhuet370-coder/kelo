services:
  # Serveur web pour le site
  web:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-8080}:80"  # Port personnalisable (défaut 8080 pour Synology)
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - kelo-network
    restart: unless-stopped



  # Broker MQTT
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - kelo-network
    restart: unless-stopped

 
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    networks:
      - kelo-network
    depends_on:
      - mosquitto
    restart: unless-stopped
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    networks:
      - kelo-network
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-admin12345}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-kelonia}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-kelonia}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-kelonia-super-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2

  telegraf:
    image: telegraf:1.31
    user: "0:0"
    networks:
      - kelo-network
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped
    environment:
      - INFLUXDB_ORG=${INFLUXDB_ORG:-kelonia}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-kelonia}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-kelonia-super-token}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    networks:
      - kelo-network
    depends_on:
      - influxdb
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - INFLUXDB_ORG=${INFLUXDB_ORG:-kelonia}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-kelonia}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-kelonia-super-token}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

networks:
  kelo-network:
    driver: bridge

volumes:
  grafana-data:
  influxdb-data:



